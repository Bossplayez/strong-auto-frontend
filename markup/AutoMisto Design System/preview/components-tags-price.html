<!DOCTYPE html><html lang="uk"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:var(--bg);font-family:Inter,sans-serif}.r{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center}.tag{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:4px 10px;border-radius:4px;color:#fff;background:#1c2230}.chip{font-size:13px;font-weight:600;padding:7px 14px;border-radius:6px;cursor:pointer}.chip-on{background:#1c2230;color:#fff}.chip-off{background:#fff;color:#0f1116;border:1px solid #cdd1d6}.price{display:inline-flex;align-items:center;background:#fff;color:#22c55e;border:2px solid #22c55e;font-weight:700;font-size:18px;padding:4px 10px;border-radius:6px;font-family:Inter,sans-serif}.l{font-size:11px;color:var(--fg-muted);font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}</style></head><body>
<div class="l">Status badges · placed top-left of photo</div>
<div class="r">
<span class="tag">АВТО В УКРАЇНІ</span>
<span class="tag">АВТО В ДОРОЗІ</span>
<span class="tag">АВТО З США</span>
<span class="tag">ТОРГ</span>
<span class="tag">ДОСТАВКА У ВАШЕ МІСТО</span>
<span class="tag" style="background:#22c55e">НОВЕ В ПРОДАЖУ</span>
</div>
<div class="l">Filter chips · category toggle</div>
<div class="r">
<span class="chip chip-on">АВТО В ДОРОЗІ</span>
<span class="chip chip-off">АВТО З США</span>
<span class="chip chip-off">АВТО В УКРАЇНІ</span>
</div>
<div class="l">Price tag · the signature element</div>
<div class="r">
<span class="price">$12 000</span>
<span class="price" style="font-size:24px;padding:6px 14px">$21 900</span>
<span class="price" style="border-color:#1c2230;color:#1c2230">$15 000</span>
</div>
</body></html>
