<!DOCTYPE html><html lang="uk"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:var(--bg);font-family:Inter,sans-serif}.r{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}button{font-family:inherit;font-weight:600;font-size:14px;padding:10px 20px;border-radius:8px;border:1px solid transparent;cursor:pointer;transition:all 140ms}.p{background:#22c55e;color:#fff}.p:hover{background:#1aa050}.s{background:#fff;color:#0f1116;border-color:#cdd1d6}.d{background:#1c2230;color:#fff}.g{background:transparent;color:#0f1116}.dis{background:#e6e8eb;color:#9ea4ad;cursor:not-allowed}.l{font-size:11px;color:var(--fg-muted);font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px}</style></head><body>
<div class="l">Buttons · Strong Auto</div>
<div class="r">
<button class="p">Увійти</button>
<button class="p" style="padding:12px 28px;font-size:15px">Розрахувати вартість</button>
<button class="p" style="width:240px">Детальніше</button>
<button class="d">Зареєструватися</button>
</div>
<div class="r">
<button class="s">Показати більше</button>
<button class="s">Очистити фільтри</button>
<button class="g">Розширені фільтри</button>
<button class="dis" disabled>Ставка прийнята</button>
</div>
<div class="r">
<button class="p" style="padding:14px 24px;font-size:15px;display:inline-flex;align-items:center;gap:8px">Конкурувати за аукціон</button>
<button class="s" style="display:inline-flex;align-items:center;gap:6px">♡&nbsp;&nbsp;Додати в обране</button>
<button class="p" style="padding:14px 28px;font-size:15px">Показати 1 333 033 авто</button>
</div>
</body></html>
