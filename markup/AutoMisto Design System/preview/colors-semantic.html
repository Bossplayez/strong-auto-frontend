<!DOCTYPE html><html lang="uk"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:var(--bg)}.g{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.i{border:1px solid var(--border);background:#fff;border-radius:8px;padding:12px;display:flex;align-items:center;gap:12px}.d{width:34px;height:34px;border-radius:6px;border:1px solid rgba(0,0,0,.06);flex-shrink:0}.n{font-size:13px;font-weight:700;color:var(--fg)}.r{font-size:11px;color:var(--fg-muted);font-family:var(--font-mono)}.l{font-size:11px;color:var(--fg-muted);font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px}</style></head><body>
<div class="l">Semantic roles</div>
<div class="g">
<div class="i"><div class="d" style="background:#22c55e"></div><div><div class="n">Primary</div><div class="r">--primary</div></div></div>
<div class="i"><div class="d" style="background:#1c2230"></div><div><div class="n">Dark surface</div><div class="r">--bg-dark</div></div></div>
<div class="i"><div class="d" style="background:#0f1116"></div><div><div class="n">Foreground</div><div class="r">--fg</div></div></div>
<div class="i"><div class="d" style="background:#4a5366"></div><div><div class="n">Foreground muted</div><div class="r">--fg-muted</div></div></div>
<div class="i"><div class="d" style="background:#f3f4f5"></div><div><div class="n">Page bg</div><div class="r">--bg</div></div></div>
<div class="i"><div class="d" style="background:#ffffff"></div><div><div class="n">Card</div><div class="r">--bg-card</div></div></div>
<div class="i"><div class="d" style="background:#e6e8eb"></div><div><div class="n">Border</div><div class="r">--border</div></div></div>
<div class="i"><div class="d" style="background:#131825"></div><div><div class="n">Footer</div><div class="r">--bg-darker</div></div></div>
</div></body></html>
