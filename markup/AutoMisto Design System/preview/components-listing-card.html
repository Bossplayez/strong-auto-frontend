<!DOCTYPE html><html lang="uk"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:var(--bg);font-family:Inter,sans-serif}.card{background:#fff;border-radius:8px;overflow:hidden;width:300px;display:flex;flex-direction:column}.photo{height:170px;background:#1c2230;position:relative;padding:10px;box-sizing:border-box}.tag{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:4px 8px;border-radius:3px;color:#fff;background:rgba(255,255,255,.15);display:inline-block}.body{padding:14px 16px}.title{display:flex;justify-content:space-between;align-items:center;font-family:Oswald,sans-serif;font-weight:700;font-size:20px;margin-bottom:10px}.price{color:#22c55e;border:2px solid #22c55e;font-weight:700;font-size:15px;padding:2px 8px;border-radius:5px;font-family:Inter,sans-serif}.spec{display:flex;justify-content:space-between;font-size:13px;padding:5px 0}.spec span:first-child{color:#6e7480}.spec span:last-child{font-weight:600}.cta{margin-top:12px;width:100%;background:#22c55e;color:#fff;border:none;padding:10px;border-radius:6px;font-weight:600;font-size:14px;font-family:inherit;cursor:pointer}.l{font-size:11px;color:var(--fg-muted);font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:14px}</style></head><body>
<div class="l">Listing card · the core tile</div>
<div style="display:flex;gap:14px">
<div class="card">
<div class="photo"><span class="tag">АВТО В УКРАЇНІ</span></div>
<div class="body">
<div class="title">Audi Q5 2020<span class="price">$12 000</span></div>
<div class="spec"><span>Двигун</span><span>180 000 км</span></div>
<div class="spec"><span>Пробіг</span><span>83 568 км</span></div>
<div class="spec"><span>Привід</span><span>Повний</span></div>
<div class="spec"><span>Коробка передач</span><span>Автоматична</span></div>
<button class="cta">Детальніше</button>
</div>
</div>
<div class="card">
<div class="photo"><span class="tag">АВТО З США</span></div>
<div class="body">
<div class="title">Nissan Sentra 2018<span class="price">$8 200</span></div>
<div class="spec"><span>Двигун</span><span>1.8L I4 DOHC</span></div>
<div class="spec"><span>Пробіг</span><span>97 000 км</span></div>
<div class="spec"><span>Привід</span><span>Передній</span></div>
<div class="spec"><span>Коробка передач</span><span>CVT</span></div>
<button class="cta">Детальніше</button>
</div>
</div>
</div>
</body></html>
