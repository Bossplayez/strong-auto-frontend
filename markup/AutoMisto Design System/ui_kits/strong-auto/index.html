<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strong Auto — UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  body { margin: 0; padding-left: 76px; }
  /* nav strip at top of preview */
  .screen-nav {
    position: fixed; top: 86px; left: 50%; transform: translateX(-50%);
    background: var(--navy-900); border-radius: 999px; padding: 6px;
    display: flex; gap: 4px; z-index: 100; box-shadow: 0 8px 24px rgba(0,0,0,.18);
  }
  .screen-nav button {
    background: transparent; color: rgba(255,255,255,.7); border: none;
    padding: 7px 16px; border-radius: 999px; font-family: inherit;
    font-size: 12px; font-weight: 600; cursor: pointer;
  }
  .screen-nav button.on { background: var(--green-500); color: #fff; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="Components.jsx"></script>
<script type="text/babel" src="Screens.jsx"></script>
<script type="text/babel">
  const { useState, useEffect } = React;

  function App() {
    const [screen, setScreen] = useState('home');
    const [listing, setListing] = useState(null);

    useEffect(() => {
      if (window.lucide) window.lucide.createIcons();
    });

    const screens = [
      { id: 'home', label: 'Головна' },
      { id: 'search', label: 'Каталог' },
      { id: 'listing', label: 'Авто в Україні' },
      { id: 'auction-list', label: 'Аукціон' },
    ];

    const onListing = (l) => { setListing(l); setScreen('listing'); };

    let body;
    if (screen === 'home')         body = <HomeScreen   onNav={setScreen} onListing={onListing} />;
    else if (screen === 'search')  body = <SearchScreen onListing={onListing} />;
    else if (screen === 'listing') body = <ListingScreen listing={listing} onNav={setScreen} />;
    else                           body = <AuctionScreen onNav={setScreen} />;

    return (
      <div data-screen-label={screens.find(s => s.id === screen)?.label || screen}>
        <LeftRail active={screen === 'home' ? 'home' : screen === 'search' ? 'usa' : screen === 'listing' ? 'home' : 'auction'} onNav={setScreen} />
        <TopHeader onNav={setScreen} />
        <div className="screen-nav">
          {screens.map(s => (
            <button key={s.id} className={screen === s.id || (s.id === 'auction-list' && screen === 'auction-list') ? 'on' : ''}
              onClick={() => setScreen(s.id === 'auction-list' ? 'auction-list' : s.id)}>
              {s.label}
            </button>
          ))}
        </div>
        {body}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
